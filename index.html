<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камень, Ножницы, Бумага — AI</title>

    <!-- Библиотеки TensorFlow.js и Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>

    <style>
        /* ===== ТЁМНАЯ ТЕМА ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 20px;
            font-size: 2.2rem;
            background: linear-gradient(90deg, #ff6fd8, #3813c2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* ===== ОБЛАСТЬ КАМЕРЫ ===== */
        #camera-container {
            position: relative;
            margin: 15px auto;
            border: 3px solid #3813c2;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(56, 19, 194, 0.4);
        }

        /* Камера теперь на canvas — это правильно для Teachable Machine */
        #webcam {
            display: block;
            width: 320px;
            height: 240px;
            border-radius: 12px;
            transform: scaleX(-1); /* Зеркальное отображение */
        }

        /* ===== ТАЙМЕР ОБРАТНОГО ОТСЧЁТА ===== */
        #countdown-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            font-size: 5rem;
            font-weight: bold;
            color: #ff6fd8;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #countdown-overlay.visible {
            opacity: 1;
        }

        /* ===== ПАНЕЛЬ РЕЗУЛЬТАТОВ ===== */
        #result-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .choice-box {
            text-align: center;
            min-width: 150px;
        }

        .choice-box .label {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .choice-box .emoji {
            font-size: 6rem;
            line-height: 1;
            transition: transform 0.3s;
        }

        .choice-box .emoji.pop {
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* VS разделитель */
        #vs {
            font-size: 2rem;
            font-weight: bold;
            color: #555;
        }

        /* ===== РЕЗУЛЬТАТ РАУНДА ===== */
        #round-result {
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            text-align: center;
        }

        #round-result.win {
            color: #00e676;
            animation: winGlow 0.6s ease 3;
        }

        #round-result.lose {
            color: #ff1744;
        }

        #round-result.draw {
            color: #ffea00;
        }

        @keyframes winGlow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 30px rgba(0, 230, 118, 0.8), 0 0 60px rgba(0, 230, 118, 0.4);
                transform: scale(1.15);
            }
        }

        /* ===== СЧЁТ ===== */
        #scoreboard {
            display: flex;
            gap: 30px;
            margin: 10px 0 20px;
            font-size: 1.3rem;
        }

        .score-item {
            padding: 8px 20px;
            border-radius: 10px;
            background: #1a1a2e;
            border: 1px solid #333;
        }

        .score-item span {
            font-weight: bold;
            font-size: 1.5rem;
        }

        .score-player span { color: #00e676; }
        .score-cpu span { color: #ff1744; }
        .score-draw span { color: #ffea00; }

        /* ===== КНОПКА СТАРТ ===== */
        #start-btn {
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6fd8, #3813c2);
            color: #fff;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 111, 216, 0.5);
        }

        #start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== ИНДИКАТОР ЗАГРУЗКИ ===== */
        #loading {
            font-size: 1.1rem;
            color: #888;
            margin: 10px 0;
        }

        #loading .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #555;
            border-top-color: #ff6fd8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ПРОГРЕСС-БАР ТАЙМЕРА ===== */
        #timer-bar-container {
            width: 320px;
            height: 6px;
            background: #1a1a2e;
            border-radius: 3px;
            margin: 5px auto;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3813c2, #ff6fd8);
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        /* ===== КОНФЕТТИ ПРИ ПОБЕДЕ ===== */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 500px) {
            h1 { font-size: 1.5rem; }
            .choice-box .emoji { font-size: 4rem; }
            #result-panel { gap: 15px; }
            #scoreboard { gap: 10px; font-size: 1rem; }
            #webcam { width: 280px; height: 210px; }
            #timer-bar-container { width: 280px; }
        }
    </style>
</head>
<body>

    <h1>✊ Камень · Ножницы · Бумага ✋</h1>

    <!-- Индикатор загрузки модели -->
    <div id="loading">
        <span class="spinner"></span> Загрузка модели ИИ...
    </div>

    <!-- Область камеры (теперь canvas — правильно для Teachable Machine) -->
    <div id="camera-container">
        <canvas id="webcam" width="320" height="240"></canvas>
        <div id="countdown-overlay"></div>
    </div>

    <!-- Прогресс-бар до следующего сканирования -->
    <div id="timer-bar-container">
        <div id="timer-bar"></div>
    </div>

    <!-- Кнопка старта -->
    <button id="start-btn" disabled>▶ Начать игру</button>

    <!-- Панель результатов -->
    <div id="result-panel">
        <div class="choice-box">
            <div class="label">Игрок</div>
            <div class="emoji" id="player-emoji">❓</div>
        </div>
        <div id="vs">VS</div>
        <div class="choice-box">
            <div class="label">Компьютер</div>
            <div class="emoji" id="cpu-emoji">❓</div>
        </div>
    </div>

    <!-- Результат раунда -->
    <div id="round-result">Нажми «Начать игру»</div>

    <!-- Табло счёта -->
    <div id="scoreboard">
        <div class="score-item score-player">Вы: <span id="score-player">0</span></div>
        <div class="score-item score-draw">Ничья: <span id="score-draw">0</span></div>
        <div class="score-item score-cpu">ИИ: <span id="score-cpu">0</span></div>
    </div>

    <script>
        // ===== КОНФИГУРАЦИЯ =====
        // Ссылка на модель Teachable Machine
        const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/17IyybW14/';

        // Интервал между сканированиями жестов (мс)
        const SCAN_INTERVAL = 3000;

        // Эмодзи для каждого класса
        const EMOJIS = {
            'камень': '✊',
            'ножницы': '✌️',
            'бумага': '🖐️',
            'пустой': ''
        };

        // Варианты выбора компьютера
        const CPU_CHOICES = ['камень', 'ножницы', 'бумага'];

        // ===== СОСТОЯНИЕ ИГРЫ =====
        let model = null;             // Модель Teachable Machine
        let webcam = null;            // Объект веб-камеры Teachable Machine
        let isPlaying = false;        // Флаг: игра идёт
        let scanTimer = null;         // Таймер сканирования
        let progressTimer = null;     // Таймер прогресс-бара
        let score = { player: 0, cpu: 0, draw: 0 }; // Счёт

        // ===== DOM-ЭЛЕМЕНТЫ =====
        const loadingEl = document.getElementById('loading');
        const startBtn = document.getElementById('start-btn');
        const playerEmoji = document.getElementById('player-emoji');
        const cpuEmoji = document.getElementById('cpu-emoji');
        const roundResult = document.getElementById('round-result');
        const scorePlayer = document.getElementById('score-player');
        const scoreCpu = document.getElementById('score-cpu');
        const scoreDraw = document.getElementById('score-draw');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const timerBar = document.getElementById('timer-bar');

        // ===== ЗАГРУЗКА МОДЕЛИ =====
        async function initModel() {
            try {
                // Загружаем модель и метаданные
                const modelURL = MODEL_URL + 'model.json';
                const metadataURL = MODEL_URL + 'metadata.json';

                model = await tmImage.load(modelURL, metadataURL);

                // Инициализируем веб-камеру
                // Передаём наш canvas как target — Teachable Machine сам будет рисовать на нём
                webcam = new tmImage.Webcam(320, 240, true); // ширина, высота, flipX (зеркало)
                await webcam.setup(document.getElementById('webcam'));
                await webcam.play();

                // Скрываем индикатор загрузки и активируем кнопку
                loadingEl.style.display = 'none';
                startBtn.disabled = false;

                console.log('Модель загружена, камера активирована.');
            } catch (err) {
                loadingEl.innerHTML = '❌ Ошибка загрузки: ' + err.message;
                console.error('Ошибка инициализации:', err);
            }
        }

        // ===== РАСПОЗНАВАНИЕ ЖЕСТА =====
        async function detectGesture() {
            if (!model || !webcam) return null;

            // Получаем предсказания от модели
            const predictions = await model.predict(webcam.canvas);

            // Находим класс с наибольшей вероятностью
            let bestClass = '';
            let bestProb = 0;

            for (const pred of predictions) {
                if (pred.probability > bestProb) {
                    bestProb = pred.probability;
                    bestClass = pred.className;
                }
            }

            // Порог уверенности — 70%, иначе считаем «пусто»
            if (bestProb < 0.70) {
                bestClass = 'пустой';
            }

            console.log(`Жест: ${bestClass} (${(bestProb * 100).toFixed(1)}%)`);
            return bestClass;
        }

        // ===== ОПРЕДЕЛЕНИЕ ПОБЕДИТЕЛЯ =====
        function getWinner(player, cpu) {
            if (player === cpu) return 'draw';

            // Камень бьёт ножницы, ножницы бьют бумагу, бумага бьёт камень
            const wins = {
                'камень': 'ножницы',
                'ножницы': 'бумага',
                'бумага': 'камень'
            };

            if (wins[player] === cpu) return 'win';
            return 'lose';
        }

        // ===== ОБНОВЛЕНИЕ СЧЁТА НА ЭКРАНЕ =====
        function updateScoreboard() {
            scorePlayer.textContent = score.player;
            scoreCpu.textContent = score.cpu;
            scoreDraw.textContent = score.draw;
        }

        // ===== АНИМАЦИЯ ПОЯВЛЕНИЯ ЭМОДЗИ =====
        function animateEmoji(element) {
            element.classList.remove('pop');
            // Перезапуск анимации через reflow
            void element.offsetWidth;
            element.classList.add('pop');
        }

        // ===== ЭФФЕКТ КОНФЕТТИ ПРИ ПОБЕДЕ =====
        function launchConfetti() {
            const colors = ['#ff6fd8', '#3813c2', '#00e676', '#ffea00', '#ff1744', '#00b0ff'];

            for (let i = 0; i < 40; i++) {
                const piece = document.createElement('div');
                piece.classList.add('confetti-piece');
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.top = '-10px';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.width = (Math.random() * 8 + 6) + 'px';
                piece.style.height = (Math.random() * 8 + 6) + 'px';
                piece.style.animation = `confettiFall ${Math.random() * 2 + 1.5}s ease-out forwards`;
                piece.style.animationDelay = Math.random() * 0.5 + 's';

                document.body.appendChild(piece);

                // Удаляем элемент после анимации
                setTimeout(() => piece.remove(), 4000);
            }
        }

        // ===== ОБРАТНЫЙ ОТСЧЁТ 3-2-1 =====
        function showCountdown() {
            return new Promise((resolve) => {
                let count = 3;
                countdownOverlay.textContent = count;
                countdownOverlay.classList.add('visible');

                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownOverlay.textContent = count;
                    } else {
                        clearInterval(interval);
                        countdownOverlay.classList.remove('visible');
                        resolve();
                    }
                }, 700);
            });
        }

        // ===== ЗАПУСК ПРОГРЕСС-БАРА =====
        function startProgressBar() {
            let elapsed = 0;
            timerBar.style.width = '0%';

            progressTimer = setInterval(() => {
                elapsed += 100;
                const pct = Math.min((elapsed / SCAN_INTERVAL) * 100, 100);
                timerBar.style.width = pct + '%';

                if (elapsed >= SCAN_INTERVAL) {
                    clearInterval(progressTimer);
                }
            }, 100);
        }

        // ===== ОСНОВНОЙ ЦИКЛ РАУНДА =====
        async function playRound() {
            if (!isPlaying) return;

            // Обратный отсчёт для подготовки игрока
            await showCountdown();

            // Сканируем жест
            const gesture = await detectGesture();

            // Если жест не распознан (пусто), пропускаем
            if (!gesture || gesture === 'пустой') {
                roundResult.textContent = '🤷 Жест не распознан — покажи камень, ножницы или бумагу!';
                roundResult.className = '';
                roundResult.id = 'round-result';

                // Перезапускаем цикл
                if (isPlaying) {
                    startProgressBar();
                    scanTimer = setTimeout(playRound, SCAN_INTERVAL);
                }
                return;
            }

            // Компьютер выбирает случайный жест
            const cpuChoice = CPU_CHOICES[Math.floor(Math.random() * CPU_CHOICES.length)];

            // Показываем жесты с анимацией
            playerEmoji.textContent = EMOJIS[gesture] || '❓';
            cpuEmoji.textContent = EMOJIS[cpuChoice] || '❓';
            animateEmoji(playerEmoji);
            animateEmoji(cpuEmoji);

            // Определяем победителя
            const result = getWinner(gesture, cpuChoice);

            // Обновляем счёт и результат
            if (result === 'win') {
                score.player++;
                roundResult.textContent = '🎉 Ты победил!';
                roundResult.className = 'win';
                roundResult.id = 'round-result';
                launchConfetti(); // Конфетти при победе
            } else if (result === 'lose') {
                score.cpu++;
                roundResult.textContent = '😞 Компьютер победил!';
                roundResult.className = 'lose';
                roundResult.id = 'round-result';
            } else {
                score.draw++;
                roundResult.textContent = '🤝 Ничья!';
                roundResult.className = 'draw';
                roundResult.id = 'round-result';
            }

            updateScoreboard();

            // Следующий раунд через интервал
            if (isPlaying) {
                startProgressBar();
                scanTimer = setTimeout(playRound, SCAN_INTERVAL);
            }
        }

        // ===== ОБРАБОТЧИК КНОПКИ «СТАРТ» =====
        startBtn.addEventListener('click', () => {
            if (!isPlaying) {
                // Запускаем игру
                isPlaying = true;
                startBtn.textContent = '⏹ Остановить';
                roundResult.textContent = 'Игра началась!';
                roundResult.className = '';
                roundResult.id = 'round-result';
                startProgressBar();
                playRound();
            } else {
                // Останавливаем игру
                isPlaying = false;
                startBtn.textContent = '▶ Начать игру';
                clearTimeout(scanTimer);
                clearInterval(progressTimer);
                timerBar.style.width = '0%';
                roundResult.textContent = 'Игра остановлена.';
                roundResult.className = '';
                roundResult.id = 'round-result';
            }
        });

        // ===== ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ СТРАНИЦЫ =====
        window.addEventListener('DOMContentLoaded', initModel);
    </script>
</body>
</html>
